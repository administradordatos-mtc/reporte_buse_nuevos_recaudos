<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acceso protegido · La Carolina</title>
<style>
:root{--red:#c92525;--gold:#d7b85f;--dark:#151b1e;--cream:#f2efe5}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top left,#3a1116,#151b1e 55%,#050607);font-family:Inter,Segoe UI,Arial,sans-serif;color:#fff}.card{width:min(460px,92vw);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:28px;padding:30px;box-shadow:0 24px 70px rgba(0,0,0,.45);backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:14px;margin-bottom:18px}.mark{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,var(--gold),#fff1a8);color:#111;display:grid;place-items:center;font-size:25px;font-weight:900}.muted{color:#f7e7ad}.field{margin-top:18px}label{display:block;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#f7e7ad;margin-bottom:8px}input{width:100%;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.12);border-radius:16px;padding:14px 16px;color:#fff;font-size:18px;outline:none}button{width:100%;margin-top:18px;border:0;border-radius:16px;padding:14px 18px;font-weight:900;font-size:16px;background:linear-gradient(135deg,var(--gold),#fff1a8);color:#111;cursor:pointer}.note{margin-top:14px;font-size:13px;color:#e8e0c8;line-height:1.45}</style>
</head>
<body>
  <form class="card" method="post" action="/api/login">
    <div class="brand"><div class="mark">LC</div><div><h1 style="margin:0">La Carolina</h1><div class="muted">Transporte con Corazón</div></div></div>
    <h2 style="margin:0 0 6px">Informe protegido</h2>
    <p class="muted" style="margin:0">Ingrese la clave de acceso para ver el recaudo de vehículos 10* año 2026.</p>
    <input type="hidden" name="next" id="next" value="/">
    <div class="field"><label>Clave de acceso</label><input name="access_key" type="password" autocomplete="current-password" required autofocus></div>
    <button type="submit">Entrar al informe</button>
    <div class="note">La clave se valida en el servidor de Vercel. No queda escrita dentro del HTML público.</div>
  </form>
  <script>const n=new URLSearchParams(location.search).get('next'); if(n) document.getElementById('next').value=n;</script>
</body>
</html>
